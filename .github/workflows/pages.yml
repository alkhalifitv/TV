name: Sync EPG & CS3 lalu Deploy ke GitHub Pages

on:
  schedule:
    - cron: '30 22 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # 1️⃣ Checkout repo public (TV)
      # =========================================================
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          ref: master

      # =========================================================
      # 2️⃣ Checkout repo private EPG
      # =========================================================
      - name: Checkout private repo (EPG)
        uses: actions/checkout@v4
        with:
          repository: alkhalifitv/alkhalifitv.github.io
          token: ${{ secrets.EPG_TOKEN }}
          path: private-epg

      - name: Copy EPG files
        run: |
          mkdir -p epg
          cp -v private-epg/guide/global/guide.xml.gz epg/ || true
          cp -v private-epg/guide/global/idn.xml.gz epg/ || true

      # =========================================================
      # 3️⃣ Checkout repo private CS3
      # =========================================================
      - name: Checkout private repo (CS3)
        uses: actions/checkout@v4
        with:
          repository: alkhalifitv/cloud-Extension
          ref: builds
          token: ${{ secrets.EPG_TOKEN }}
          path: private-cs3

      - name: Copy CS3 files
        run: |
          mkdir -p cs3
          cp -v private-cs3/*.cs3 cs3/ || true

      # =========================================================
      # 4️⃣ Setup Python & AUTO REWRITE plugins.json
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rewrite plugins.json ke versi PUBLIC
        run: |
          python3 scripts/rewrite_plugins.py

      # =========================================================
      # 5️⃣ Commit & Push jika ada perubahan
      # =========================================================
      - name: Commit dan push perubahan
        run: |
          git config user.name "alkhalifitv"
          git config user.email "backtrack512@gmail.com"

          git add epg/ cs3/

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan"
          else
            git commit -m "Update EPG & CS3 (public rewrite)"
            git push origin master
          fi

      # =========================================================
      # 6️⃣ Siapkan folder deploy
      # =========================================================
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp -r epg deploy/
          cp -r cs3 deploy/
          cp -r logo deploy/ 2>/dev/null || true
          cp README.md deploy/ 2>/dev/null || true

      - name: Convert README.md ke index.html
        run: |
          if [ -f deploy/README.md ]; then
            pip install markdown
            markdown deploy/README.md > deploy/index.html
          else
            echo "<h1>TV Repository</h1>" > deploy/index.html
          fi

      # =========================================================
      # 7️⃣ Upload & Deploy GitHub Pages
      # =========================================================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy ke GitHub Pages
        uses: actions/deploy-pages@v4

name: Sync EPG, Playlist & CS3

on:
  schedule:
    # Jalan tiap 2 hari jam 22:30 UTC
    - cron: '30 22 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # 1️⃣ Checkout repo PUBLIC (TV)
      # =========================================================
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          ref: master

      # =========================================================
      # 2️⃣ Checkout repo PRIVATE EPG + Playlist
      # =========================================================
      - name: Checkout private repo (EPG)
        uses: actions/checkout@v4
        with:
          repository: alkhalifitv/alkhalifitv.github.io
          token: ${{ secrets.EPG_TOKEN }}
          path: private-epg

      - name: Copy EPG & Playlist
        run: |
          mkdir -p epg
          cp -v private-epg/guide/global/guide.xml.gz epg/ || true
          cp -v private-epg/guide/global/idn.xml.gz epg/ || true
          cp -v private-epg/playlist/playlist.m3u8 . || true

      # =========================================================
      # 3️⃣ Checkout repo PRIVATE CS3
      # =========================================================
      - name: Checkout private repo (CS3)
        uses: actions/checkout@v4
        with:
          repository: alkhalifitv/cloud-Extension
          ref: builds
          token: ${{ secrets.EPG_TOKEN }}
          path: private-cs3

      - name: Copy CS3 files
        run: |
          mkdir -p cs3
          cp -v private-cs3/*.cs3 cs3/ || true

      # =========================================================
      # 4️⃣ Setup Python
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # =========================================================
      # 5️⃣ Rewrite plugins.json (PRIVATE → PUBLIC)
      # =========================================================
      - name: Rewrite plugins.json
        run: |
          python3 scripts/rewrite_plugins.py

      # =========================================================
      # 6️⃣ Commit & push jika ADA perubahan data
      # =========================================================
      - name: Commit & push changes
        run: |
          git config user.name "alkhalifitv"
          git config user.email "backtrack512@gmail.com"

          git add epg/ cs3/

          if git diff --cached --quiet; then
            echo "ℹ️ Tidak ada perubahan data"
          else
            git commit -m "Update EPG & CS3 (auto sync)"
            git push origin master
          fi

      # =========================================================
      # 7️⃣ Prepare deploy folder (GitHub Pages)
      # =========================================================
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp -r epg deploy/
          cp -r cs3 deploy/
          cp playlist.m3u8 deploy/ || true
          cp -r logo deploy/ 2>/dev/null || true

      # =========================================================
      # 8️⃣ Generate index.html (AUTO)
      # =========================================================
      - name: Generate index.html
        run: |
          python3 scripts/gen_index_plugins.py

      # =========================================================
      # 9️⃣ Upload & Deploy GitHub Pages
      # =========================================================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
